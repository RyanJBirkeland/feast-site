<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for depth -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <!-- Green gradient for the F -->
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <!-- Subtle glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners for iOS -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGradient)"/>

  <!-- Subtle border -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="none" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Bold F letterform -->
  <g filter="url(#glow)">
    <!-- Main F shape - bold geometric design -->
    <path d="
      M 280 200
      L 744 200
      L 744 330
      L 430 330
      L 430 460
      L 680 460
      L 680 590
      L 430 590
      L 430 824
      L 280 824
      Z
    " fill="url(#greenGradient)"/>
  </g>

  <!-- Accent line for extra boldness -->
  <rect x="744" y="200" width="12" height="130" fill="#10B981" opacity="0.6"/>
</svg>
